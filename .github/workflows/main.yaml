name: Deploy Python app

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Novo passo: Copia os arquivos do repositório para a VM
      - name: Copiar arquivos para a VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "." # Copia tudo do repositório
          target: "~/meu-projeto-docker" # Pasta destino dentro da sua VM

      # Passo atualizado: Acessa a VM, faz o build e roda
      - name: SSH, Build e Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Navega até a pasta onde está o seu Dockerfile
            # Usamos aspas por causa dos espaços no nome da pasta
            cd ~/meu-projeto-docker/"Monitoramento - Python"

            # 2. Faz o build da imagem localmente na VM
            sudo docker build -t cursodocker-python:latest .

            # 3. Para e remove o container antigo
            sudo docker stop meu-app-python || true
            sudo docker rm meu-app-python || true

            # 4. Roda o novo container usando a imagem que acabamos de "buildar"
            sudo docker run -d \
              --name meu-app-python \
              -v /var/run/docker.sock:/var/run/docker.sock \
              cursodocker-python:latest

            # 5. Limpa imagens antigas para não lotar o disco
            sudo docker image prune -f

            echo "✅ DEPLOY DO APP PYTHON FINALIZADO COM SUCESSO!" | sudo wall
            echo "Deploy finalizado em: $(date)" > ~/status_deploy.txt
