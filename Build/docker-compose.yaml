services:
  nodeapp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VERSION=v1.2.0
    container_name: nodejs-compose
    environment:
      - PORT=5000
    ports:
      - "5055:5000"
    networks:
      - curso_network
  flaskapp:
    build:
      context: . 
      dockerfile: Dockerfile.python
    container_name: flask-compose
    ports:
      - "5056:5000"
    networks:
      - curso_network
    depends_on:
      - nodeapp
  
networks:
  curso_network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400